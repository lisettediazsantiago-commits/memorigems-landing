<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caregiver Companion · Demo · MemoriGems</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{ --cream:#FCFAF5; --ink-faint:rgba(42,35,23,.5); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--cream); }
  .stage{ display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
           padding:32px 16px 40px; background:var(--cream); font-family:'Inter',-apple-system,system-ui,sans-serif; }
  .device-label{ font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; text-transform:uppercase;
                 color:var(--ink-faint); margin-bottom:18px; }

  /* phone bezel — matches the Create-a-Gem device family */
  .phone{ width:352px; max-width:90vw; background:#1b1d1c; border-radius:46px; padding:11px;
          box-shadow:0 34px 70px rgba(42,35,23,.20); position:relative; }
  .phone::before{ content:""; position:absolute; top:18px; left:50%; transform:translateX(-50%);
                  width:46px; height:5px; border-radius:5px; background:rgba(255,255,255,.16); z-index:2; pointer-events:none; }
  .screen{ position:relative; background:var(--cream); border-radius:36px; height:690px; overflow:hidden; }
  .screen iframe{ width:100%; height:100%; border:0; display:block; background:var(--cream); }

  @media (max-width:430px){
    .phone{ width:100%; border-radius:40px; }
    .screen{ height:620px; border-radius:30px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="device-label">On her phone</div>
    <div class="phone">
      <div class="screen">
        <iframe src="caregiver-app.html" title="Caregiver Companion — interactive demo" loading="eager"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
