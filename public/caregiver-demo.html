      <p class=&quot;av-intro&quot;>A Gem is a small piece of you &amp;mdash; a voice note, a memory, a song &amp;mdash; kept for someone you love. Not sure where to begin? Pick a spark.</p>
      <button class=&quot;gem-idea&quot; data-gem=&quot;A reassurance&quot;>
        <span class=&quot;gi-ic&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><path d=&quot;M12 20S4 14 4 8.5A3.5 3.5 0 0 1 12 6a3.5 3.5 0 0 1 8 2.5C20 14 12 20 12 20z&quot;/></svg></span>
        <span><span class=&quot;gi-t&quot;>A reassurance</span><span class=&quot;gi-s&quot;>&amp;ldquo;I&amp;rsquo;m here. You&amp;rsquo;re safe. I love you.&amp;rdquo; A few words they can return to.</span></span>
      </button>
      <button class=&quot;gem-idea&quot; data-gem=&quot;A shared memory&quot;>
        <span class=&quot;gi-ic&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><rect x=&quot;3&quot; y=&quot;5&quot; width=&quot;18&quot; height=&quot;14&quot; rx=&quot;2&quot;/><path d=&quot;m3 15 5-5 4 4 3-3 6 6&quot;/></svg></span>
        <span><span class=&quot;gi-t&quot;>A shared memory</span><span class=&quot;gi-s&quot;>That summer at the lake, the song you always sang. Tell it the way you remember it.</span></span>
      </button>
      <button class=&quot;gem-idea&quot; data-gem=&quot;An everyday anchor&quot;>
        <span class=&quot;gi-ic&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot;/><path d=&quot;M12 7v5l3 2&quot;/></svg></span>
        <span><span class=&quot;gi-t&quot;>An everyday anchor</span><span class=&quot;gi-s&quot;>&amp;ldquo;Good morning. Here&amp;rsquo;s what today looks like.&amp;rdquo; Gentle, familiar, steadying.</span></span>
      </button>
      <button class=&quot;gem-idea&quot; data-gem=&quot;A favorite song or prayer&quot;>
        <span class=&quot;gi-ic&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><path d=&quot;M9 18V5l12-2v13&quot;/><circle cx=&quot;6&quot; cy=&quot;18&quot; r=&quot;3&quot;/><circle cx=&quot;18&quot; cy=&quot;16&quot; r=&quot;3&quot;/></svg></span>
        <span><span class=&quot;gi-t&quot;>A favorite song or prayer</span><span class=&quot;gi-s&quot;>The one that always settles them. Hum it, sing it, or just say the words.</span></span>
      </button>
      <div class=&quot;gem-confirm&quot; id=&quot;gemConfirm&quot;></div>
      <button class=&quot;av-primary&quot; id=&quot;gemStart&quot;><svg viewBox=&quot;0 0 24 24&quot; width=&quot;18&quot; height=&quot;18&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M12 18.5a3 3 0 0 0 3-3v-7a3 3 0 0 0-6 0v7a3 3 0 0 0 3 3zM5 11.5a7 7 0 0 0 14 0M12 18.5V22&quot;/></svg>Open the Gem recorder</button>
      <p class=&quot;av-note&quot;>In the full app this opens the recorder, so you can capture it in your own voice.</p>

  <section class=&quot;actview&quot; id=&quot;av-story&quot; aria-hidden=&quot;true&quot; aria-label=&quot;Read a Caregiver Story&quot;>
    <div class=&quot;av-head&quot;><button class=&quot;av-back&quot; aria-label=&quot;Back&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M19 12H5M12 19l-7-7 7-7&quot;/></svg></button><span class=&quot;av-title&quot;>Read a Caregiver Story</span></div>
    <div class=&quot;av-body&quot;>
      <p class=&quot;av-intro&quot;>Short, true-to-life stories from people walking this path. Tap one to read.</p>

      <article class=&quot;story-card open&quot;>
        <div class=&quot;story-head&quot;><div><div class=&quot;story-h&quot;>The Tuesday I stopped apologizing</div><div class=&quot;story-by&quot;>Renata, caring for her mother</div></div><span class=&quot;story-chev&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;m6 9 6 6 6-6&quot;/></svg></span></div>
        <div class=&quot;story-body&quot;>
          <p>For a year I said sorry constantly. Sorry I was late. Sorry I forgot. Sorry I snapped when she asked the same question for the ninth time before lunch.</p>
          <p>One Tuesday a nurse stopped me mid-apology and said, &amp;ldquo;You&amp;rsquo;re doing the work of three people. What if you spoke to yourself like you speak to her?&amp;rdquo; I cried in the parking lot. Then I tried it. When I forgot something, I said, &amp;ldquo;That&amp;rsquo;s okay, you&amp;rsquo;re tired.&amp;rdquo; Out loud, like I would to Mom.</p>
          <p>Nothing about the caregiving got easier. But I got kinder to the person doing it. That turned out to matter more than I expected.</p>
        </div>
      </article>

      <article class=&quot;story-card&quot;>
        <div class=&quot;story-head&quot;><div><div class=&quot;story-h&quot;>What my father still knows</div><div class=&quot;story-by&quot;>David, son and care partner</div></div><span class=&quot;story-chev&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;m6 9 6 6 6-6&quot;/></svg></span></div>
        <div class=&quot;story-body&quot;>
          <p>He doesn&amp;rsquo;t always know my name now. For a long time that felt like losing him twice.</p>
          <p>Then I noticed the things that stayed. He still reaches for my mother&amp;rsquo;s hand. He still hums when the radio plays the old songs. He still says &amp;ldquo;thank you&amp;rdquo; to the woman who brings his tea, every single time, like it&amp;rsquo;s the first kindness anyone&amp;rsquo;s shown him.</p>
          <p>What memory takes, it doesn&amp;rsquo;t take all at once. The man who taught me to be gentle is still gentle. I&amp;rsquo;ve stopped grieving who he forgot and started noticing who he still is.</p>
        </div>
      </article>

      <article class=&quot;story-card&quot;>
        <div class=&quot;story-head&quot;><div><div class=&quot;story-h&quot;>Permission to rest</div><div class=&quot;story-by&quot;>Aisha, caring for her husband</div></div><span class=&quot;story-chev&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;m6 9 6 6 6-6&quot;/></svg></span></div>
        <div class=&quot;story-body&quot;>
          <p>I thought love meant being there every minute. So I stopped sleeping, stopped seeing friends, stopped being a person who existed outside his needs.</p>
          <p>My sister came for a weekend and made me leave the house. Two hours. I sat in a cafe and didn&amp;rsquo;t know what to do with my hands. When I came back, he was fine &amp;mdash; better, even, because I came back lighter.</p>
          <p>Rest isn&amp;rsquo;t abandoning him. An empty cup pours nothing. I take the two hours now. I&amp;rsquo;ve learned that staying whole is part of staying.</p>
        </div>
      </article>
    </div>
  </section>

  <div class=&quot;scrim&quot; id=&quot;scrim&quot;></div>

  <script type=&quot;module&quot;>
    // Public preview — no authentication, no redirects.
    const body = document.body;
    document.getElementById('menuBtn').addEventListener('click', () => body.classList.add('nav-open'));
    document.getElementById('scrim').addEventListener('click', () => body.classList.remove('nav-open'));
    document.querySelectorAll('#sidebar .nav a').forEach(a => a.addEventListener('click', () => body.classList.remove('nav-open')));
    document.querySelectorAll('[data-soon]').forEach(el => el.addEventListener('click', e => e.preventDefault()));

    // Embedded preview: in-app sub-screens (.html) aren't part of this demo, so keep them
    // inert (no 404). Real on-page anchors (#top, #season, #support, #resources) still scroll.
    // Delegated so dynamically re-rendered action links are covered too.
    document.addEventListener('click', function(e){
      var open = e.target.closest('[data-view]');
      if (open) { e.preventDefault(); openView(open.getAttribute('data-view')); return; }
      var back = e.target.closest('.av-back');
      if (back) { e.preventDefault(); closeView(); return; }
      var a = e.target.closest('a[href]');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      if (href.endsWith('.html') || href.includes('.html#') || href === '#') { e.preventDefault(); }
    }, true);

    const DATA = {
      overwhelmed:{t:&quot;Caregiving can feel heavy.&quot;,m:&quot;You don't have to carry everything today.&quot;,o:['ground','reflect','gem','story']},
      sad:{t:&quot;It's okay to feel the weight of this.&quot;,m:&quot;Sadness is love with nowhere to go right now — be gentle with yourself.&quot;,o:['reflect','story','ground','gem']},
      hopeful:{t:&quot;Hold onto that hope.&quot;,m:&quot;It's a quiet strength worth protecting.&quot;,o:['gem','reflect','story','ground']},
      frustrated:{t:&quot;Frustration is human.&quot;,m:&quot;It doesn't make you any less caring. Let's ease the pressure for a moment.&quot;,o:['ground','reflect','story','gem']},
      grateful:{t:&quot;What a gift to notice the good.&quot;,m:&quot;Let's hold onto this feeling — maybe even keep it.&quot;,o:['gem','reflect','story','ground']},
      exhausted:{t:&quot;You've been giving so much.&quot;,m:&quot;Rest isn't a luxury; it's part of caring well.&quot;,o:['ground','reflect','story','gem']},
      unsure:{t:&quot;Not knowing is okay.&quot;,m:&quot;You don't need it all figured out today — just one small step.&quot;,o:['reflect','story','ground','gem']}
    };
    const ICONS = {
      reflect:'<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><rect x=&quot;5&quot; y=&quot;3&quot; width=&quot;14&quot; height=&quot;18&quot; rx=&quot;2&quot;/><path d=&quot;M9 3v18M12 8h4M12 12h4&quot;/></svg>',
      ground:'<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><path d=&quot;M5 19c0-8 6-13 14-13 0 8-6 13-14 13z&quot;/><path d=&quot;M5 19c2-4 5-6 9-7&quot;/></svg>',
      gem:'<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><path d=&quot;M6 3h12l4 6-10 13L2 9l4-6z&quot;/></svg>',
      story:'<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><path d=&quot;M12 6S9 4 4 4v14c5 0 8 2 8 2s3-2 8-2V4c-5 0-8 2-8 2z&quot;/><path d=&quot;M12 6v14&quot;/></svg>'
    };
    const ACTIONS = {
      reflect:{label:'2-minute Reflection', href:'reflection.html'},
      ground:{label:'Grounding Exercise', href:'grounding.html'},
      gem:{label:'Create a Meaningful Gem', href:'choose-gem.html'},
      story:{label:'Read a Caregiver Story', href:'caregiver-stories.html'}
    };
    const feels = document.querySelectorAll('#feels .feel');
    const t = document.getElementById('supTitle'), m = document.getElementById('supMsg');
    const actsEl = document.getElementById('acts');
    function render(key){
      const d = DATA[key]; if (!d) return;
      t.textContent = d.t; m.textContent = d.m;
      actsEl.innerHTML = d.o.map(function(k, i){
        const a = ACTIONS[k];
        return '<a class=&quot;act' + (i === 0 ? ' lead' : '') + '&quot; data-view=&quot;' + k + '&quot; href=&quot;' + a.href + '&quot;><span class=&quot;ai&quot;>' + ICONS[k] + '</span>' + a.label + (i === 0 ? '<span class=&quot;sg&quot;>Suggested</span>' : '') + '</a>';
      }).join('');
    }
    feels.forEach(function(b){
      b.addEventListener('click', function(){
        feels.forEach(function(x){ x.classList.remove('active'); });
        b.classList.add('active');
        render(b.dataset.k);
      });
    });
    render((document.querySelector('#feels .feel.active') || {dataset:{k:'overwhelmed'}}).dataset.k);

    /* ---------- in-app action views ---------- */
    var activeView = null;
    function openView(key){
      var v = document.getElementById('av-' + key); if (!v) return;
      if (activeView &amp;&amp; activeView !== v) activeView.classList.remove('open');
      body.classList.remove('nav-open');
      v.classList.add('open'); v.setAttribute('aria-hidden','false');
      document.documentElement.style.overflow = 'hidden';
      var b = v.querySelector('.av-body'); if (b) b.scrollTop = 0;
      activeView = v;
      if (key === 'ground') resetBreath();
    }
    function closeView(){
      if (!activeView) return;
      activeView.classList.remove('open'); activeView.setAttribute('aria-hidden','true');
      document.documentElement.style.overflow = '';
      if (activeView.id === 'av-ground') stopBreath();
      if (activeView.id === 'av-reflect') stopReflTimer();
      activeView = null;
    }
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeView(); });

    /* story expand / collapse */
    document.querySelectorAll('#av-story .story-head').forEach(function(h){
      h.addEventListener('click', function(){ h.closest('.story-card').classList.toggle('open'); });
    });

    /* breathing */
    var breathRing = document.getElementById('breathRing'),
        breathPhase = document.getElementById('breathPhase'),
        breathCount = document.getElementById('breathCount'),
        breathBtn = document.getElementById('breathBtn');
    var breathTimers = [], breathing = false, breathCycles = 0;
    var PHASES = [{c:'inhale',label:'Breathe in',ms:4000},{c:'hold',label:'Hold',ms:2000},{c:'exhale',label:'Breathe out',ms:6000}];
    function clearBreath(){ breathTimers.forEach(clearTimeout); breathTimers = []; }
    function stopBreath(){ breathing = false; clearBreath(); }
    function resetBreath(){ stopBreath(); breathCycles = 0; breathRing.className = 'breath-ring'; breathPhase.textContent = 'Ready'; breathCount.textContent = 'Press start when you\u2019re ready.'; breathBtn.textContent = 'Begin'; }
    function runPhase(i){
      if (!breathing) return;
      var p = PHASES[i];
      breathRing.className = 'breath-ring ' + p.c;
      breathPhase.textContent = p.label;
      if (i === 0){ breathCycles++; breathCount.textContent = 'Breath ' + breathCycles; }
      breathTimers.push(setTimeout(function(){ runPhase((i + 1) % PHASES.length); }, p.ms));
    }
    if (breathBtn) breathBtn.addEventListener('click', function(){
      if (breathing){ stopBreath(); breathRing.className = 'breath-ring'; breathPhase.textContent = 'Paused'; breathBtn.textContent = 'Resume'; return; }
      breathing = true; breathBtn.textContent = 'Pause'; runPhase(0);
    });

    /* reflection */
    var RFL_PROMPTS = [
      'What is one small thing that went okay today?',
      'What do you need right now that no one has offered?',
      'Name one thing you handled that you didn\u2019t think you could.',
      'What would you say to a friend in your exact situation?',
      'Where did you feel a moment of connection recently?',
      'What can you set down, just for tonight?'
    ];
    var rflPrompt = document.getElementById('rflPrompt'), rflNew = document.getElementById('rflNew'),
        rflClock = document.getElementById('rflClock'), rflStart = document.getElementById('rflStart');
    var rflLeft = 120, rflInt = null, rflRunning = false;
    function rflFmt(s){ var m = Math.floor(s/60), x = s%60; return m + ':' + (x<10?'0':'') + x; }
    function stopReflTimer(){ rflRunning = false; if (rflInt){ clearInterval(rflInt); rflInt = null; } }
    if (rflNew) rflNew.addEventListener('click', function(){ var n; do { n = RFL_PROMPTS[Math.floor(Math.random()*RFL_PROMPTS.length)]; } while (n === rflPrompt.textContent); rflPrompt.textContent = n; });
    if (rflStart) rflStart.addEventListener('click', function(){
      if (rflRunning){ stopReflTimer(); rflStart.textContent = 'Resume'; return; }
      if (rflLeft <= 0){ rflLeft = 120; rflClock.textContent = '2:00'; }
      rflRunning = true; rflStart.textContent = 'Pause';
      rflInt = setInterval(function(){
        rflLeft--; rflClock.textContent = rflFmt(rflLeft);
        if (rflLeft <= 0){ stopReflTimer(); rflClock.textContent = 'Done'; rflStart.textContent = 'Again'; rflLeft = 0; }
      }, 1000);
    });

    /* gem ideas */
    var gemConfirm = document.getElementById('gemConfirm'), gemStart = document.getElementById('gemStart');
    document.querySelectorAll('#av-gem .gem-idea').forEach(function(g){
      g.addEventListener('click', function(){
        document.querySelectorAll('#av-gem .gem-idea').forEach(function(x){ x.classList.remove('sel'); });
        g.classList.add('sel');
        gemConfirm.textContent = 'Lovely choice \u2014 ' + g.getAttribute('data-gem').toLowerCase() + '. When you\u2019re ready, the recorder below lets you capture it in your own voice.';
        gemConfirm.classList.add('show');
      });
    });
    if (gemStart) gemStart.addEventListener('click', function(){
      gemConfirm.textContent = 'In the full app, this opens the recorder so you can capture your Gem in your own voice.';
      gemConfirm.classList.add('show');
      gemConfirm.scrollIntoView({behavior:'smooth', block:'center'});
    });
  </script>
