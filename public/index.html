<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoriGems</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #F2F0E9;
      color: #2C2C2A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .gem {
      width: 120px; height: 120px; border-radius: 50%;
      background-color: #9FE1CB;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
    }
    .gem-icon { width: 56px; height: 56px; color: #0F6E56; }

    h1 { font-size: 28px; font-weight: 500; margin-bottom: 12px; color: #2C2C2A; }

    .tagline {
      font-size: 15px; color: #5F5E5A; line-height: 1.6;
      margin-bottom: 40px; padding: 0 16px;
    }

    .cta-button {
      display: inline-block;
      background-color: #1D9E75; color: #FFFFFF;
      padding: 14px 32px; border-radius: 16px;
      font-size: 15px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      border: none; font-family: inherit;
    }
    .cta-button:hover { background: #0F6E56; }

    .signin-row {
      margin-top: 16px;
      font-size: 13px;
      color: #5F5E5A;
    }
    .signin-row a, .signin-row button.linklike {
      color: #1D9E75;
      text-decoration: none;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      padding: 0;
    }
    .signin-row a:hover, .signin-row button.linklike:hover { color: #0F6E56; }

    .footer-note { margin-top: 24px; font-size: 12px; color: #888780; font-style: italic; }
    .footer-link {
      color: #1D9E75; text-decoration: none; font-style: normal;
      border-bottom: 1px dotted #B4D7C8; padding-bottom: 1px;
    }
    .footer-link:hover { color: #0F6E56; }

    .site-footer {
      position: fixed; bottom: 16px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: #888780;
      line-height: 1.5;
    }
    .footer-small { font-size: 10px; color: #B4B2A9; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="gem">
      <svg class="gem-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 3h12l4 6-10 13L2 9l4-6z" />
      </svg>
    </div>
    <h1>MemoriGems</h1>
    <p class="tagline">
      A space for the voices that carry comfort — for those we love, and the moments they need us most.
    </p>

    <button class="cta-button" id="beginBtn">Begin</button>

    <div class="signin-row" id="signinRow">
      <span id="signinPrompt">Already have an account?</span>
      <a href="signin.html" id="signinLink">Sign in</a>
    </div>

    <p class="footer-note">
      <a href="about.html" class="footer-link">About MemoriGems</a>
      <span class="footer-divider">·</span>
      <a href="https://tally.so/r/449KRA" target="_blank" rel="noopener" class="footer-link">Stay in the loop</a>
    </p>
  </div>

  <footer class="site-footer">
    <p>Made with care by Lisette Diaz-Santiago</p>
    <p class="footer-small">MemoriGems · HuLux Innovations</p>
  </footer>

  <script type="module">
    import { waitForAuth, signOutUser } from "./firebase-config.js";

    const beginBtn = document.getElementById("beginBtn");
    const signinRow = document.getElementById("signinRow");
    const signinPrompt = document.getElementById("signinPrompt");
    const signinLink = document.getElementById("signinLink");

    const user = await waitForAuth();

    if (user) {
      // Already signed in — show "Signed in as" and turn the link into a Sign out action
      signinPrompt.textContent = `Signed in as ${user.email || 'you'}.`;
      signinLink.textContent = "Sign out";
      signinLink.removeAttribute("href");
      signinLink.style.cursor = "pointer";

      signinLink.addEventListener("click", async (e) => {
        e.preventDefault();
        if (confirm("Sign out of MemoriGems?")) {
          try {
            await signOutUser();
            window.location.href = "signin.html";
          } catch (err) {
            console.error(err);
            alert("Could not sign out. Please try again.");
          }
        }
      });
    }

    beginBtn.addEventListener("click", () => {
      if (!user) {
        window.location.href = "signin.html?next=" + encodeURIComponent("profile-select.html");
      } else {
        window.location.href = "profile-select.html";
      }
    });
  </script>
</body>
</html>
