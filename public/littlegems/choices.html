<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem Choices — A LittleGems Feelings Game</title>
<meta name="description" content="A free social-emotional learning game for kids. Read a situation and choose the kindest thing to do, collecting gems along the way.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --beige-cream:#FBF6EE;
    --beige-warm:#FDF0E8;
    --ink:#2A2317;
    --ink-soft:#524634;
    --ink-faint:rgba(42,35,23,0.6);
    --gold:#B89248; --gold-deep:#8C6E32;
    --coral:#E07A52; --coral-l:#FDEDE4; --coral-d:#B5552E;
    --sky:#4E97A6;   --sky-l:#E4F1F4;   --sky-d:#2E6B78;
    --mint:#6BA876;  --mint-l:#E8F3E9;  --mint-d:#3F7A4A;
    --sun:#D6A94E;   --sun-l:#FBF0DC;   --sun-d:#946C1E;
    --serif:'Cormorant Garamond',Georgia,serif;
    --display:'Cinzel',serif;
    --sans:'Inter',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:var(--serif);
    background:
      radial-gradient(ellipse at top,rgba(224,122,82,0.06) 0%,transparent 55%),
      radial-gradient(ellipse at bottom left,rgba(78,151,166,0.05) 0%,transparent 50%),
      linear-gradient(180deg,var(--beige-cream) 0%,var(--beige-warm) 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:22px 16px;
  }
  .wrap{width:100%;max-width:600px}

  .topline{font-family:var(--display);text-align:center;font-size:11px;letter-spacing:5px;color:var(--mint-d);margin-bottom:12px}
  h1{font-family:var(--serif);font-weight:500;font-size:clamp(28px,6vw,40px);text-align:center;line-height:1.1;margin-bottom:8px;color:var(--ink)}
  h1 em{font-style:italic;color:var(--mint-d);font-weight:500}
  .sub{text-align:center;color:var(--ink-soft);font-size:18px;margin-bottom:24px;font-style:italic}

  .namebar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .namebar label{font-style:italic;color:var(--ink-soft);font-size:15px}
  .namebar input{font-family:var(--serif);font-size:16px;color:var(--ink);border:none;border-bottom:1.5px solid #D9C39A;background:transparent;padding:2px 6px;width:130px;text-align:center;outline:none}
  .namebar input:focus{border-bottom-color:var(--coral)}

  .jar-wrap{display:flex;align-items:center;gap:18px;justify-content:center;background:#FFFDF9;border:1px solid rgba(184,146,72,0.2);border-radius:16px;padding:16px 20px;margin-bottom:18px}
  .jar-wrap svg{flex:0 0 auto}
  .jar-info{text-align:left}
  .jar-title{font-family:var(--serif);font-size:18px;color:var(--ink);margin:0 0 2px}
  .jar-total{font-family:var(--display);font-size:26px;color:var(--coral-d);line-height:1.1;margin:0}
  .jar-total span{font-family:var(--serif);font-size:15px;color:var(--ink-soft);font-style:italic}
  .jar-reset{font-family:var(--sans);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);background:none;border:none;cursor:pointer;margin-top:6px;padding:0;text-decoration:underline}
  .jar-reset:hover{color:var(--coral-d)}
  @media(max-width:430px){.jar-wrap{gap:12px;padding:14px}.jar-total{font-size:22px}}

  .panel{background:#FFFDF9;border-radius:20px;padding:24px;border:1px solid rgba(184,146,72,0.2);box-shadow:0 20px 50px -30px rgba(140,110,50,0.4)}

  .scene{background:var(--beige-cream);border:1px solid rgba(184,146,72,0.22);border-radius:14px;padding:18px 20px;text-align:center;margin-bottom:20px}
  .scene .ey{font-family:var(--display);font-size:10px;letter-spacing:3px;color:var(--coral-d);margin:0 0 8px}
  .scene .q{font-size:20px;color:var(--ink);line-height:1.45;margin:0}

  .opts{display:flex;flex-direction:column;gap:14px}
  .opt{
    display:flex;align-items:center;gap:14px;width:100%;text-align:left;
    background:#fff;border:2.5px solid var(--coral);border-radius:14px;
    padding:14px 18px;cursor:pointer;font-family:var(--serif);
    box-shadow:0 3px 0 #F5C4B3;transition:transform .1s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .opt:hover{transform:translateY(-2px)}
  .opt:active{transform:translateY(0)}
  .opt:focus-visible{outline:3px solid var(--coral);outline-offset:2px}
  .opt .ic{flex:0 0 auto}
  .opt .tx{font-size:17px;color:var(--ink);font-weight:600;line-height:1.3}
  .opt.correct{border-color:var(--mint);box-shadow:0 0 0 4px var(--mint-l),0 3px 0 #BFDCC2}
  .opt.dim{opacity:0.5}

  .msg{text-align:center;margin-top:18px;min-height:26px;font-size:18px;font-style:italic;color:var(--ink-soft)}
  .msg .ok{color:var(--mint-d);font-style:normal;font-family:var(--sans);font-size:15px;font-weight:500}

  .controls{text-align:center;margin-top:14px}
  .btn{font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:13px 32px;border-radius:999px;background:var(--ink);color:var(--beige-cream);border:none;cursor:pointer;transition:all .3s ease}
  .btn:hover{background:var(--mint-d);transform:translateY(-2px)}
  .btn:active{transform:scale(0.97)}

  .foot{font-family:var(--sans);text-align:center;margin-top:18px;font-size:12px;letter-spacing:1px;color:var(--ink-faint)}
  .foot a{color:var(--coral-d);text-decoration:none;font-weight:500}

  @keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
  @keyframes wig{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
  .pop{animation:pop .35s ease}
  .wig{animation:wig .4s ease}
  .glow{animation:glow .7s ease 2}
  @media(prefers-reduced-motion:reduce){.opt,.pop,.wig,.glow,.gembox{animation:none!important;transition:none!important}}

  .confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:50;border-radius:2px;pointer-events:none}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:0}}
</style>
</head>
<body>
<div class="wrap">
  <p class="topline">A LITTLE CHOICES GAME</p>
  <h1>Gem <em>Choices</em></h1>
  <p class="sub">Which gem holds the kindest thing to do?</p>

  <div class="namebar">
    <label for="nick">My name (optional):</label>
    <input id="nick" type="text" maxlength="14" placeholder="type here" aria-label="Your nickname, optional">
  </div>

  <div class="jar-wrap">
    <svg id="jar" viewBox="0 0 160 180" width="120" height="135" aria-label="Your gem jar"></svg>
    <div class="jar-info">
      <p class="jar-title" id="jarTitle">My Gem Jar</p>
      <p class="jar-total"><span id="totalNum">0</span> <span>gems collected</span></p>
      <button class="jar-reset" id="jarReset">Start over</button>
    </div>
  </div>

  <div class="panel">
    <div class="scene">
      <p class="ey">THE MOMENT</p>
      <p class="q" id="scene">…</p>
    </div>
    <div class="opts" id="opts"></div>
    <div class="msg" id="msg">Tap the gem with the kindest choice.</div>
    <div class="controls"><button class="btn" id="next" style="display:none">Next moment</button></div>
  </div>

  <p class="foot">PART OF <a href="https://www.mymemorigems.com/littlegems">LITTLEGEMS</a> · FREE · NO SIGNUP NEEDED</p>
</div>

<script>
(function(){
  var SCENARIOS=[
    {q:"Your friend dropped their lunch tray and everyone is looking. What do you do?",
     good:"Help them pick it up and say it's okay",
     bad:["Laugh along with the other kids","Look away and pretend you didn't see"]},
    {q:"A new kid is standing alone at recess. What do you do?",
     good:"Walk over and ask if they want to play",
     bad:["Stay with your own friends only","Wait for them to come to you first"]},
    {q:"You feel really angry because you lost the game. What do you do?",
     good:"Take a deep breath before you say anything",
     bad:["Yell that it wasn't fair","Knock the game pieces off the table"]},
    {q:"Your friend has a toy you really want to play with. What do you do?",
     good:"Ask nicely if you can have a turn",
     bad:["Grab it out of their hands","Tell them their toy is dumb"]},
    {q:"You accidentally broke your sister's drawing. What do you do?",
     good:"Tell her you're sorry and offer to help fix it",
     bad:["Hide it and hope she doesn't notice","Say she shouldn't have left it there"]},
    {q:"A classmate gets the answer wrong and looks embarrassed. What do you do?",
     good:"Tell them it's okay, everyone makes mistakes",
     bad:["Whisper about it to your friend","Raise your hand to say you knew it"]},
    {q:"You're feeling worried about a test tomorrow. What do you do?",
     good:"Tell a grown-up how you're feeling",
     bad:["Keep it all to yourself","Decide not to go to school"]},
    {q:"Your friend wants to play one game, but you want another. What do you do?",
     good:"Take turns — their game, then yours",
     bad:["Say you won't play at all","Keep insisting until they give in"]},
    {q:"Someone says something that hurts your feelings. What do you do?",
     good:"Tell them calmly that it made you feel sad",
     bad:["Say something mean back","Pretend you don't care and hold it in"]},
    {q:"You see two kids leaving someone out on purpose. What do you do?",
     good:"Invite the left-out kid to join you",
     bad:["Join the two kids instead","Decide it's not your problem"]},
    {q:"You really want a snack but it's almost dinner. A grown-up says no. What do you do?",
     good:"Say okay and wait for dinner",
     bad:["Sneak the snack anyway","Cry until they change their mind"]},
    {q:"Your friend is crying because they miss their mom. What do you do?",
     good:"Sit with them and ask if they want a hug",
     bad:["Tell them to stop crying","Go play somewhere else"]},
    {q:"You made a mistake and your team didn't win. What do you do?",
     good:"Say sorry and try your best next time",
     bad:["Blame a teammate for it","Refuse to play with them again"]},
    {q:"Your little brother wants to help but he's slow. What do you do?",
     good:"Let him help and be patient",
     bad:["Do it all yourself and shoo him away","Tell him he's too little to help"]},
    {q:"A friend tells you a secret that makes you worried for them. What do you do?",
     good:"Tell a trusted grown-up who can help",
     bad:["Keep it secret no matter what","Tell all your other friends"]},
    {q:"You're frustrated because your shoelaces won't tie. What do you do?",
     good:"Take a breath and try again slowly",
     bad:["Throw the shoes across the room","Give up and refuse to wear them"]}
  ];

  var SWATCH=[
    {raw:"#E07A52",l:"#FDEDE4",d:"#B5552E",lip:"#F5C4B3"},
    {raw:"#4E97A6",l:"#E4F1F4",d:"#2E6B78",lip:"#AED4DC"},
    {raw:"#6BA876",l:"#E8F3E9",d:"#3F7A4A",lip:"#BFDCC2"},
    {raw:"#D6A94E",l:"#FBF0DC",d:"#946C1E",lip:"#F0DBA8"}
  ];

  function jewelIcon(cols){
    return '<svg class="ic" viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">'+
      '<circle cx="16" cy="16" r="12" fill="'+cols.raw+'" stroke="'+cols.d+'" stroke-width="1.5"/>'+
      '<path d="M16 6 L22 12 L16 18 L10 12 Z" fill="#fff" opacity="0.55"/>'+
      '</svg>';
  }

  var sceneEl=document.getElementById("scene"),
      optsEl=document.getElementById("opts"),
      msg=document.getElementById("msg"),
      nextBtn=document.getElementById("next");
  var order=[], oi=0, solved=false;
  var cheers=["Kind choice! You earned a gem.","Lovely thinking! Gem earned.","That's a caring choice!","Beautifully done — gem earned."];
  var nudges=["Try again — what would feel kind?","Hmm, is there a kinder choice?","Try again — think how they'd feel.","Not quite — look for the caring one."];

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

  function loadScenario(){
    solved=false;
    nextBtn.style.display="none";
    msg.textContent="Tap the gem with the kindest choice.";
    msg.className="msg";
    var sc=SCENARIOS[order[oi]];
    sceneEl.textContent=sc.q;
    var choices=[{t:sc.good,ok:true}];
    sc.bad.forEach(function(b){choices.push({t:b,ok:false});});
    shuffle(choices);
    optsEl.innerHTML="";
    choices.forEach(function(ch,i){
      var cols=SWATCH[i%SWATCH.length];
      var b=document.createElement("button");
      b.className="opt";
      b.style.borderColor=cols.raw;
      b.style.boxShadow="0 3px 0 "+cols.lip;
      b.innerHTML=jewelIcon(cols)+'<span class="tx">'+ch.t+'</span>';
      b.addEventListener("click",function(){choose(ch,b,cols);});
      optsEl.appendChild(b);
    });
  }

  function choose(ch,b,cols){
    if(solved)return;
    if(ch.ok){
      solved=true;
      b.classList.add("correct","glow");
      b.style.borderColor=cols.raw;
      var sibs=optsEl.querySelectorAll(".opt");
      for(var i=0;i<sibs.length;i++){if(sibs[i]!==b)sibs[i].classList.add("dim");}
      total++;saveTotal();drawJar();
      gembox_pulse();
      msg.innerHTML='<span class="ok">✦ '+cheers[total%cheers.length]+'</span>';
      nextBtn.style.display="";
    } else {
      b.classList.remove("wig");void b.offsetWidth;b.classList.add("wig");
      msg.textContent=nudges[(oi+1)%nudges.length];
    }
  }

  nextBtn.addEventListener("click",function(){
    oi++;
    if(oi>=order.length){order=shuffle(makeOrder());oi=0;}
    loadScenario();
  });

  function makeOrder(){var a=[];for(var i=0;i<SCENARIOS.length;i++)a.push(i);return shuffle(a);}

  function gembox_pulse(){
    var jb=document.querySelector(".jar-wrap");
    if(!jb)return;
  }

  function celebrateLittle(){}

  var KEY_TOTAL="littlegems_match_total", KEY_NAME="littlegems_match_name";
  var total=0;
  var totalEl=document.getElementById("totalNum"),
      jarEl=document.getElementById("jar"),
      jarTitle=document.getElementById("jarTitle"),
      nickEl=document.getElementById("nick");

  function loadTotal(){try{var v=window.localStorage.getItem(KEY_TOTAL);total=v?parseInt(v,10)||0:0;}catch(e){total=0;}}
  function saveTotal(){try{window.localStorage.setItem(KEY_TOTAL,String(total));}catch(e){}totalEl.textContent=total;}
  function loadName(){try{var n=window.localStorage.getItem(KEY_NAME)||"";nickEl.value=n;applyName(n);}catch(e){}}
  function applyName(n){n=(n||"").trim();jarTitle.textContent=n?(n+"'s Gem Jar"):"My Gem Jar";}
  nickEl.addEventListener("input",function(){var n=nickEl.value.trim();applyName(n);try{window.localStorage.setItem(KEY_NAME,n);}catch(e){}});

  var GEMSHAPES=[
    ["#E07A52","#F0997B","#C96440"],["#4E97A6","#7FB7C4","#3A7B89"],
    ["#6BA876","#97C49B","#4F8559"],["#D6A94E","#E8C77E","#B5882E"],
    ["#C77EB5","#DDA8D0","#A85C97"],["#D88AA0","#EBB3C2","#B5647C"]
  ];
  function gemSVG(x,y,s,cols){
    return '<g transform="translate('+x+','+y+')" stroke="#5B3A8C" stroke-width="'+(2*s).toFixed(1)+'" stroke-linejoin="round">'+
      '<path d="M0 '+(6*s)+' L'+(8*s)+' '+(-6*s)+' L'+(20*s)+' '+(-6*s)+' L'+(28*s)+' '+(6*s)+' L'+(14*s)+' '+(16*s)+' Z" fill="'+cols[0]+'"/>'+
      '<path d="M'+(8*s)+' '+(-6*s)+' L'+(14*s)+' '+(4*s)+' L0 '+(6*s)+' Z" fill="'+cols[1]+'"/>'+
      '<path d="M'+(20*s)+' '+(-6*s)+' L'+(14*s)+' '+(4*s)+' L'+(28*s)+' '+(6*s)+' Z" fill="'+cols[2]+'"/>'+
      '</g>';
  }
  function drawJar(){
    totalEl.textContent=total;
    var jarBody='<ellipse cx="80" cy="170" rx="46" ry="8" fill="#000" opacity="0.06"/>'+
      '<path d="M52 30 h56 v8 q12 3 12 18 v74 q0 12 -14 12 h-52 q-14 0 -14 -12 v-74 q0 -15 12 -18 z" fill="#DCEEF3" stroke="#4E97A6" stroke-width="2.5" opacity="0.75"/>';
    var clip='<clipPath id="jarClip"><path d="M54 40 q-12 4 -12 18 v74 q0 10 14 10 h48 q14 0 14 -10 v-74 q0 -14 -12 -18 z"/></clipPath>';
    var shown=Math.min(total,28);
    var gemsHTML='';
    var cxC=80, floorY=124, rowH=11, gw=19, s=0.86;
    var caps=[2,3,3,4,4,4,5,5];
    var placed=0, row=0;
    while(placed<shown && row<caps.length){
      var capN=caps[row];var thisN=Math.min(capN, shown-placed);
      var y=floorY-row*rowH;var startX=cxC-((thisN-1)*gw)/2;
      for(var k=0;k<thisN;k++){
        var idx=placed+k;var x=startX+k*gw;
        var jx=((idx*29)%5)-2;var jy=((idx*17)%4)-2;
        var cols=GEMSHAPES[(idx*3+row)%GEMSHAPES.length];
        gemsHTML+=gemSVG(x+jx-13, y+jy, s, cols);
      }
      placed+=thisN; row++;
    }
    var lid='<path d="M52 30 h56 v8 h-56 z" fill="#B89248" stroke="#8C6E32" stroke-width="2"/>'+
      '<rect x="74" y="24" width="12" height="8" rx="2" fill="#C9A66C" stroke="#8C6E32" stroke-width="1.5"/>';
    jarEl.innerHTML=jarBody+clip+'<g clip-path="url(#jarClip)">'+gemsHTML+'</g>'+lid;
  }

  document.getElementById("jarReset").addEventListener("click",function(){
    if(window.confirm("Start your gem jar over from zero?")){total=0;saveTotal();drawJar();}
  });

  loadTotal();loadName();drawJar();
  order=makeOrder();oi=0;loadScenario();
})();
</script>
</body>
</html>
