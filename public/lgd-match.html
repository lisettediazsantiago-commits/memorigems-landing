<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match · LittleGems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #F1F5EC; --ink: #2C2C2A; --muted: #6E8757;
      --green: #639922; --green-deep: #4B7A2E;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; padding: 18px 18px 36px; line-height: 1.5; }
    .lg-bg { position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: -1; background: #FAF7F0 url('lg-bg.jpg') center center / cover no-repeat; }
    .page { max-width: 460px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
    svg { display: block; } a { text-decoration: none; color: inherit; }

    #confetti { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 60; }

    .bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .back { display: inline-flex; align-items: center; gap: 6px; color: var(--green-deep); font-size: 14px; font-weight: 600; }
    .back svg { width: 18px; height: 18px; }
    .gems { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; background: #fff; border: 0.5px solid rgba(0,0,0,.07); border-radius: 100px; padding: 6px 13px; font-size: 12.5px; font-weight: 700; color: var(--green-deep); transition: transform .18s; }
    .gems svg { width: 14px; height: 14px; color: var(--green); }
    .gems.bump { transform: scale(1.18); }

    h1 { font-family: var(--serif); font-size: 32px; font-weight: 600; color: var(--green-deep); margin-top: 8px; }
    .sub { font-size: 14px; color: var(--muted); margin-top: 3px; margin-bottom: 16px; }

    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card { position: relative; aspect-ratio: 1 / 1; border-radius: 18px; cursor: pointer; border: none; padding: 0; font-family: inherit; background: transparent; }
    .face { position: absolute; inset: 0; border-radius: 18px; display: flex; align-items: center; justify-content: center; transition: opacity .15s; }
    .back-face { background: #fff; border: 2px solid #DCEACB; opacity: 1; }
    .back-face svg { width: 38%; height: 38%; color: #C7DCAE; }
    .front-face { opacity: 0; border: 2px solid rgba(0,0,0,.06); }
    .front-face svg { width: 48%; height: 48%; }
    .card.flipped .back-face { opacity: 0; }
    .card.flipped .front-face { opacity: 1; }
    .card.matched .front-face { animation: pop .4s ease; }
    .card.matched { cursor: default; }
    @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.12); } 100% { transform: scale(1); } }

    .again { display: none; margin: 18px auto 0; padding: 14px 26px; border: none; border-radius: 14px; background: var(--green); color: #fff; font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; }
    .again:hover { background: var(--green-deep); }
    .again.show { display: inline-block; }

    .win { display: none; margin-top: 16px; }
    .win.show { display: block; }
    .win h2 { font-family: var(--serif); font-size: 27px; font-weight: 600; color: var(--green-deep); }
    .win p { font-size: 14px; color: var(--muted); margin-top: 3px; }
  </style>
</head>
<body>
  <div class="lg-bg" aria-hidden="true"></div>
  <canvas id="confetti"></canvas>
  <div class="page">
    <div class="bar">
      <a class="back" href="littlegems-demo.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>Back</a>
      <span class="gems" id="gemsPill"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3h12l4 6-10 13L2 9l4-6z"/></svg><span id="gemCount">0</span> gems</span>
    </div>

    <h1>Memory Match</h1>
    <div class="sub">Tap two gems. Match a pair to collect a gem!</div>

    <div class="board" id="board"></div>

    <div class="win" id="win"><h2>You found them all!</h2><p id="winMsg">You collected 6 gems!</p></div>
    <button class="again" id="again">Play again</button>
  </div>

  <script type="module">
    try { /* demo build — no login */ }
    catch (e) { /* preview / standalone */ }

    /* ---------- confetti ---------- */
    const cv = document.getElementById('confetti'), cx = cv.getContext('2d');
    const CC = ['#E07A52','#4E97A6','#E0A93C','#8E6BB0','#D87196','#6FA84B','#F4C95D'];
    let parts = [], anim = null, dpr = 1;
    function sizeCanvas() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      cv.width = window.innerWidth * dpr; cv.height = window.innerHeight * dpr;
      cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', sizeCanvas); sizeCanvas();
    function burst(x, y, n) {
      n = n || 42;
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, sp = 3 + Math.random() * 6;
        parts.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 4, g: 0.22,
          size: 5 + Math.random() * 5, color: CC[(Math.random() * CC.length) | 0],
          rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.4, life: 0, max: 70 + Math.random() * 30 });
      }
      if (!anim) anim = requestAnimationFrame(loop);
    }
    function loop() {
      cx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life++;
        if (p.life > p.max || p.y > window.innerHeight + 30) { parts.splice(i, 1); continue; }
        const o = p.life > p.max * 0.6 ? Math.max(0, 1 - (p.life - p.max * 0.6) / (p.max * 0.4)) : 1;
        cx.save(); cx.globalAlpha = o; cx.translate(p.x, p.y); cx.rotate(p.rot);
        cx.fillStyle = p.color; cx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6); cx.restore();
      }
      if (parts.length) anim = requestAnimationFrame(loop);
      else { anim = null; cx.clearRect(0, 0, window.innerWidth, window.innerHeight); }
    }
    function burstAt(a, b) {
      const r1 = a.getBoundingClientRect(), r2 = b.getBoundingClientRect();
      burst((r1.left + r1.width / 2 + r2.left + r2.width / 2) / 2, (r1.top + r1.height / 2 + r2.top + r2.height / 2) / 2);
    }

    /* ---------- game ---------- */
    const _mem = {};
    const store = {
      get(k){ try { return localStorage.getItem(k); } catch(e){ return (k in _mem)?_mem[k]:null; } },
      set(k,v){ try { localStorage.setItem(k,v); } catch(e){ _mem[k]=v; } }
    };
    const GEMKEY = 'lg_match_gems';
    let total = parseInt(store.get(GEMKEY) || '0', 10); if (isNaN(total)) total = 0;

    const GEMS = [
      { c: '#E07A52' }, { c: '#4E97A6' }, { c: '#E0A93C' },
      { c: '#8E6BB0' }, { c: '#D87196' }, { c: '#6FA84B' }
    ];
    const GEM_PATH = 'M6 3h12l4 6-10 13L2 9l4-6z';

    const board = document.getElementById('board');
    const gemCount = document.getElementById('gemCount'), gemsPill = document.getElementById('gemsPill');
    const win = document.getElementById('win'), winMsg = document.getElementById('winMsg'), again = document.getElementById('again');

    let deck = [], first = null, lock = false, foundThisGame = 0, matched = 0;
    gemCount.textContent = total;

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }
    function collectGem() {
      total += 1; store.set(GEMKEY, String(total)); gemCount.textContent = total;
      gemsPill.classList.remove('bump'); void gemsPill.offsetWidth; gemsPill.classList.add('bump');
      setTimeout(function(){ gemsPill.classList.remove('bump'); }, 200);
    }

    function build() {
      board.innerHTML = ''; first = null; lock = false; foundThisGame = 0; matched = 0;
      win.classList.remove('show'); again.classList.remove('show');
      deck = shuffle(GEMS.concat(GEMS).map(function(g, i){ return { id: i, c: g.c }; }));
      deck.forEach(function(card){
        const b = document.createElement('button');
        b.className = 'card'; b.setAttribute('aria-label', 'Gem card');
        b.innerHTML =
          '<span class="face back-face"><svg viewBox="0 0 24 24" fill="currentColor"><path d="' + GEM_PATH + '"/></svg></span>' +
          '<span class="face front-face"><svg viewBox="0 0 24 24" fill="' + card.c + '"><path d="' + GEM_PATH + '"/></svg></span>';
        b.addEventListener('click', function(){ flip(b, card); });
        board.appendChild(b);
      });
    }

    function flip(el, card) {
      if (lock || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      el.classList.add('flipped');
      if (!first) { first = { el: el, card: card }; return; }
      if (first.card.c === card.c && first.el !== el) {
        const aEl = first.el;
        aEl.classList.add('matched'); el.classList.add('matched');
        first = null; matched += 1; foundThisGame += 1;
        collectGem();
        burstAt(aEl, el);
        if (matched === GEMS.length) setTimeout(winGame, 450);
      } else {
        lock = true;
        const a = first.el, b = el; first = null;
        setTimeout(function(){ a.classList.remove('flipped'); b.classList.remove('flipped'); lock = false; }, 850);
      }
    }

    function winGame() {
      win.classList.add('show'); again.classList.add('show');
      winMsg.textContent = 'You collected ' + foundThisGame + ' gems this round!';
      // celebratory shower from across the top
      const w = window.innerWidth;
      burst(w * 0.2, 40, 30); burst(w * 0.5, 30, 36); burst(w * 0.8, 40, 30);
      setTimeout(function(){ burst(w * 0.35, 30, 28); burst(w * 0.65, 30, 28); }, 220);
    }

    again.addEventListener('click', build);
    build();
  </script>
</body>
</html>
